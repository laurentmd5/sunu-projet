version: "3.9"

services:
  mysql:
    image: mysql:8.1
    container_name: app-gestion-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: app_gestion_projets
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - app_gestion_mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
    restart: unless-stopped

volumes:
  app_gestion_mysql_data:
